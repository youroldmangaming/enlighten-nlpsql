
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Chat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #00ff88;
    --accent-dim: #00ff8833;
    --text: #e0e0e0;
    --text-dim: #555;
    --user-bg: #1a1a1a;
    --answer-bg: #0f1f18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }

  header span {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    margin-left: auto;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .msg.user .msg-label { color: var(--accent); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 4px;
    line-height: 1.6;
    border: 1px solid var(--border);
    max-width: 100%;
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-color: #2a2a2a;
    color: #ccc;
    font-style: italic;
  }

  .msg.answer .msg-bubble {
    background: var(--answer-bg);
    border-color: #1a3a2a;
    color: var(--text);
  }

  .msg-sql {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    border-radius: 2px;
    color: #7ec8a0;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .sql-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .metabase-frame {
    width: 100%;
    height: 420px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    margin-top: 4px;
  }

  .metabase-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .metabase-link:hover { opacity: 1; }

  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 0;
  }

  .dots span {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 2px;
    animation: blink 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #question {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }

  #question:focus { border-color: var(--accent); }
  #question::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #send:hover { opacity: 0.85; }
  #send:active { transform: scale(0.97); }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .empty-state .big { font-size: 28px; opacity: 0.15; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion {
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 11px;
    transition: border-color 0.2s, color 0.2s;
    font-family: 'IBM Plex Mono', monospace;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <h1>Data&nbsp;Chat</h1>
  <span>nlsql + metabase</span>
</header>

<div id="chat">
  <div class="empty-state" id="empty">
    <div class="big">⬡</div>
    <div>Ask a question about your data</div>
    <div class="suggestions">
      <div class="suggestion" onclick="ask('How many users are in the database?')">How many users?</div>
      <div class="suggestion" onclick="ask('Show me the most recent 5 records')">Recent records</div>
      <div class="suggestion" onclick="ask('What tables are available?')">List tables</div>
      <div class="suggestion" onclick="ask('Show me a count of records per table')">Records per table</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <input id="question" type="text" placeholder="Ask anything about your data…" autocomplete="off" />
    <button id="send" onclick="submitQuestion()">Ask</button>
  </div>
</footer>

<script>
  // ← Change this if accessing from a different host
  const NLSQL_URL = `http://${window.location.hostname}:4000`;

  const chatEl = document.getElementById('chat');
  const emptyEl = document.getElementById('empty');
  const inputEl = document.getElementById('question');
  const sendBtn = document.getElementById('send');

  // Conversation history sent with every request for context
  const history = [];

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) submitQuestion();
  });

  function ask(q) {
    inputEl.value = q;
    submitQuestion();
  }

  function appendMsg(html) {
    if (emptyEl) emptyEl.remove();
    const div = document.createElement('div');
    div.innerHTML = html;
    chatEl.appendChild(div.firstElementChild);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div.firstElementChild;
  }

  async function submitQuestion() {
    const question = inputEl.value.trim();
    if (!question) return;

    inputEl.value = '';
    sendBtn.disabled = true;

    // User bubble
    appendMsg(`
      <div class="msg user">
        <div class="msg-label">You</div>
        <div class="msg-bubble">${escHtml(question)}</div>
      </div>
    `);

    // Thinking indicator
    const thinking = appendMsg(`
      <div class="msg answer" id="thinking-indicator">
        <div class="msg-label">nlsql</div>
        <div class="thinking">
          <div class="dots"><span></span><span></span><span></span></div>
          generating query…
        </div>
      </div>
    `);

    try {
      const res = await fetch(`${NLSQL_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history })
      });

      const data = await res.json();
      thinking?.remove();

      // Add to history for future context
      if (!data.error) {
        history.push({ role: "user", content: question });
        history.push({ role: "assistant", content: data.answer });
        // Keep last 10 exchanges to avoid token overflow
        if (history.length > 20) history.splice(0, 2);
      }

      if (data.error) {
        appendMsg(`
          <div class="msg answer">
            <div class="msg-label">Error</div>
            <div class="msg-bubble" style="border-color:#3a1a1a;background:#1a0a0a;color:#ff6b6b">
              ${escHtml(data.error)}
            </div>
          </div>
        `);
      } else {
        const frameHtml = data.metabase_url
          ? `<iframe class="metabase-frame" src="${data.metabase_url}" frameborder="0" allowtransparency></iframe>
             <a class="metabase-link" href="${data.metabase_url}" target="_blank">↗ open in metabase</a>`
          : '';

        appendMsg(`
          <div class="msg answer">
            <div class="msg-label">Answer</div>
            <div class="msg-bubble">${escHtml(data.answer)}</div>
            <div class="sql-label">Generated SQL</div>
            <div class="msg-sql">${escHtml(data.sql)}</div>
            ${frameHtml}
          </div>
        `);
      }
    } catch (err) {
      thinking?.remove();
      appendMsg(`
        <div class="msg answer">
          <div class="msg-label">Error</div>
          <div class="msg-bubble" style="border-color:#3a1a1a;background:#1a0a0a;color:#ff6b6b">
            Could not reach nlsql at ${NLSQL_URL}
          </div>
        </div>
      `);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
